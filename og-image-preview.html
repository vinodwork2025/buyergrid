<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #1B3A2D;
    font-family: 'Georgia', serif;
  }

  .frame {
    width: 1200px;
    height: 630px;
    position: relative;
    background: #1B3A2D;
    overflow: hidden;
  }

  /* Subtle texture */
  .frame::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  /* Radial gold glow — top left */
  .frame::after {
    content: '';
    position: absolute;
    top: -120px;
    left: -80px;
    width: 700px;
    height: 700px;
    background: radial-gradient(ellipse, rgba(139,107,20,0.13) 0%, transparent 65%);
    z-index: 0;
    pointer-events: none;
  }

  /* Gold accent bar — top */
  .accent-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #8B6B14 0%, #C9972A 40%, #8B6B14 100%);
    z-index: 10;
  }

  /* ── LEFT CONTENT ─────────────────────────────── */
  .left {
    position: absolute;
    left: 64px;
    top: 0;
    bottom: 0;
    width: 560px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    z-index: 5;
  }

  .logo-wrap {
    position: absolute;
    top: 40px;
    left: 64px;
    z-index: 10;
  }

  .logo-wrap img {
    height: 34px;
    width: auto;
    display: block;
    /* invert to white for dark bg */
    filter: brightness(0) invert(1);
  }

  .eyebrow {
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #B8891A;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .eyebrow::before {
    content: '';
    display: inline-block;
    width: 22px;
    height: 1.5px;
    background: #B8891A;
  }

  .big-num {
    font-family: 'Georgia', serif;
    font-size: 96px;
    font-weight: 700;
    line-height: 0.92;
    letter-spacing: -0.04em;
    color: #FAF3E2;
    margin-bottom: 10px;
  }

  .big-label {
    font-family: 'Arial', sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.62);
    letter-spacing: 0.01em;
    margin-bottom: 38px;
  }

  /* Stats pills row */
  .stats-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 36px;
  }

  .stat-pill {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    padding: 7px 16px;
    font-family: 'Arial', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    color: rgba(255,255,255,0.78);
    white-space: nowrap;
  }

  .stat-pill strong {
    color: #FAF3E2;
  }

  /* Divider */
  .divider {
    width: 280px;
    height: 1px;
    background: linear-gradient(90deg, rgba(139,107,20,0.5), transparent);
    margin-bottom: 22px;
  }

  /* Markets line */
  .markets {
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.38);
    letter-spacing: 0.05em;
  }

  /* Domain watermark */
  .domain {
    position: absolute;
    bottom: 36px;
    left: 64px;
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.32);
    z-index: 10;
  }

  /* ── RIGHT: SCREENSHOT STACK ──────────────────── */
  .right {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 520px;
    z-index: 4;
  }

  /* Dark gradient fade from left — blends right side into bg */
  .right::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 140px;
    height: 100%;
    background: linear-gradient(90deg, #1B3A2D 0%, transparent 100%);
    z-index: 8;
    pointer-events: none;
  }

  /* Screenshot cards */
  .shot {
    position: absolute;
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
      0 0 0 1.5px rgba(255,255,255,0.08),
      0 16px 48px rgba(0,0,0,0.55),
      0 4px 12px rgba(0,0,0,0.4);
  }

  .shot img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
  }

  /* Screenshot 1 — NRI group — back, slightly rotated right */
  .shot-1 {
    width: 310px;
    height: 210px;
    right: 24px;
    top: 30px;
    transform: rotate(2.5deg);
    z-index: 1;
    opacity: 0.75;
  }

  /* Screenshot 2 — Karimnagar — middle */
  .shot-2 {
    width: 320px;
    height: 215px;
    right: 80px;
    top: 185px;
    transform: rotate(-1.5deg);
    z-index: 2;
    opacity: 0.88;
  }

  /* Screenshot 3 — Telangana — front, bottom right */
  .shot-3 {
    width: 305px;
    height: 205px;
    right: 18px;
    top: 360px;
    transform: rotate(1.2deg);
    z-index: 3;
    opacity: 0.82;
  }

  /* Label badge on each screenshot */
  .shot-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.72));
    padding: 18px 12px 10px;
    font-family: 'Arial', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.8);
  }

  /* NRI badge on shot-1 */
  .shot-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #8B6B14;
    color: #fff;
    font-family: 'Arial', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 999px;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="accent-top"></div>

  <!-- Logo -->
  <div class="logo-wrap">
    <img src="images/logo.png" alt="BuyerGrid">
  </div>

  <!-- Left content -->
  <div class="left">
    <div class="eyebrow">Telugu Real Estate Network</div>

    <div class="big-num">30 Lakh+</div>
    <div class="big-label">Active Telugu Property Buyers</div>

    <div class="stats-row">
      <span class="stat-pill"><strong>3,378</strong> Groups</span>
      <span class="stat-pill"><strong>5 Lakh+</strong> NRI Buyers</span>
      <span class="stat-pill"><strong>₹50K</strong> from today</span>
    </div>

    <div class="divider"></div>

    <div class="markets">
      Hyderabad · Karimnagar · Vizag · Vijayawada · NRI Worldwide
    </div>
  </div>

  <!-- Domain -->
  <div class="domain">buyergrid.in</div>

  <!-- Right: screenshot stack -->
  <div class="right">
    <div class="shot shot-1">
      <img src="file:///C:/Users/Warrior/Downloads/NRIS Indian people real estate properties.png" alt="NRI group">
      <span class="shot-badge">NRI</span>
      <div class="shot-label">1,15,800 members</div>
    </div>
    <div class="shot shot-2">
      <img src="file:///C:/Users/Warrior/Downloads/Hyderabad property facebook groups.png" alt="Karimnagar group">
      <div class="shot-label">93,400 members</div>
    </div>
    <div class="shot shot-3">
      <img src="file:///C:/Users/Warrior/Downloads/Telengana property gacebook groups.png" alt="Telangana group">
      <div class="shot-label">87,900 members</div>
    </div>
  </div>

</div>
</body>
</html>
